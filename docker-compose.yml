services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: novelos
      POSTGRES_PASSWORD: novelos
      POSTGRES_DB: novelos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://novelos:novelos@postgres:5432/novelos
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: novelos
      EMBEDDING_MODEL: paraphrase-multilingual-MiniLM-L12-v2
      CORS_ORIGINS: '["http://localhost:5173","http://localhost:3000","http://localhost"]'
    depends_on:
      - postgres
      - qdrant
    volumes:
      - model_cache:/root/.cache

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  qdrant_data:
  postgres_data:
  model_cache:
